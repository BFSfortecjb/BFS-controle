<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFS Contrôle</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;padding:32px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:24px;font-size:22px;font-weight:700;color:#c0392b}
input{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
input:focus{border-color:#c0392b}
button{width:100%;padding:12px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
#err{color:#dc2626;font-size:13px;margin-bottom:10px;display:none}
#app{display:none;padding:20px;text-align:center}
</style>
</head>
<body>

<div id="login-screen">
  <div class="box">
    <div class="logo">🔥 BFS Contrôle</div>
    <div id="err"></div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button id="btn-login">Se connecter</button>
  </div>
</div>

<div id="app">
  <h2>✅ Connecté !</h2>
  <p id="user-info"></p>
  <button id="btn-logout" style="background:#6b7280;width:auto;padding:8px 16px;margin-top:12px">Déconnexion</button>
</div>

<script>
const SURL='https://dqraobwozowtnrieitkp.supabase.co';
const SKEY='sb_publishable_UhkImOyooXPnAqTCNMJ4wA_VVqscCmK';
const db=supabase.createClient(SURL,SKEY);

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function showApp(email){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-info').textContent='Connecté : '+email;
}

document.getElementById('btn-login').addEventListener('click', async()=>{
  const email=document.getElementById('email').value.trim();
  const pwd=document.getElementById('pwd').value;
  const err=document.getElementById('err');
  err.style.display='none';
  if(!email||!pwd){err.textContent='Email et mot de passe requis';err.style.display='block';return}
  const {data,error}=await db.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent='Erreur: '+error.message;err.style.display='block';return}
  showApp(data.user.email);
});

document.getElementById('pwd').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-logout').addEventListener('click',async()=>{
  await db.auth.signOut();
  showLogin();
});

// Vérifier session existante
db.auth.getSession().then(({data:{session}})=>{
  if(session) showApp(session.user.email);
  else showLogin();
});
</script>
</body>
</html>
